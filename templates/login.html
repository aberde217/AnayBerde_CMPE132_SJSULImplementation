<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SJSUL – Secure Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:        #c9a84c;
      --gold-light:  #e8c96a;
      --navy:        #0d1b2a;
      --text-main:   #e8e8e8;
      --text-muted:  #9aabbb;
      --input-bg:    rgba(255,255,255,0.06);
      --input-border:rgba(201,168,76,0.35);
      --input-focus: rgba(201,168,76,0.85);
      --card-bg:     rgba(13,27,42,0.82);
      --radius:      4px;
    }

    html, body {
      height: 100%;
      font-family: 'Source Sans 3', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--navy);
      background-image:
        radial-gradient(ellipse 80% 60% at 70% 40%, rgba(58,110,168,0.22) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 20% 80%, rgba(201,168,76,0.08) 0%, transparent 55%);
    }

    /* ── CARD ── */
    .card {
      display: flex;
      width: min(860px, 94vw);
      min-height: 400px;
      background: var(--card-bg);
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 12px;
      backdrop-filter: blur(18px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 30px 80px rgba(0,0,0,0.55),
        0 0 60px rgba(58,110,168,0.12);
      overflow: hidden;
      animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
      position: relative;
    }

    /* gold top accent line */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 0 0 2px 2px;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(22px) scale(0.98); }
      to   { opacity:1; transform: translateY(0)   scale(1);    }
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 0 0 52%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 52px 48px 52px 52px;
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 2.9rem);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff;
      line-height: 1;
    }
    .brand-name span { color: var(--gold); }

    .brand-tagline {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 10px;
      font-size: 0.82rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .divider {
      width: 36px;
      height: 1.5px;
      background: linear-gradient(90deg, var(--gold), transparent);
      margin: 28px 0;
    }

    /* ── FORM ── */
    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius);
      color: var(--text-main);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--input-focus);
      background: rgba(255,255,255,0.09);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
    }
    input::placeholder { color: rgba(154,171,187,0.45); }

    .btn-login {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 60%, var(--gold) 100%);
      background-size: 200% 100%;
      border: none;
      border-radius: var(--radius);
      color: var(--navy);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-position 0.4s, box-shadow 0.3s, transform 0.15s;
    }
    .btn-login:hover {
      background-position: right center;
      box-shadow: 0 4px 24px rgba(201,168,76,0.35);
      transform: translateY(-1px);
    }
    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 2px 10px rgba(201,168,76,0.2);
    }

    /* ── RIGHT PANEL ── */
    .right {
      flex: 0 0 48%;
      position: relative;
      overflow: hidden;
    }
    .right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      filter: brightness(0.88) saturate(1.1);
      transition: transform 8s ease;
    }
    .card:hover .right img { transform: scale(1.04); }

    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(13,27,42,0.55) 0%,
        rgba(13,27,42,0.1) 40%,
        transparent 100%
      );
      z-index: 1;
    }
    .right::after {
      content: 'Dr. Martin Luther King, Jr. Library · San José';
      position: absolute;
      bottom: 12px; right: 14px;
      z-index: 2;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .card { flex-direction: column; }
      .left { padding: 40px 32px; }
      .right { flex: 0 0 200px; }
      .right::after { display: none; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="left">
      <div class="brand-name">SJS<span>UL</span></div>
      <div class="brand-tagline">
        <span>🔒</span> Secure Login
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label for="library-id">Library ID</label>
        <input type="text" id="library-id" name="library_id"
               placeholder="Enter your Library ID" autocomplete="username"/>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Enter your password" autocomplete="current-password"/>
      </div>

      <button type="button" class="btn-login">Login</button>
    </div>

    <div class="right">
      <img
        src="https://blogs.sjsu.edu/president/files/2018/09/MLK-Library-27s5z3k.jpg"
        alt="Dr. Martin Luther King, Jr. Library – San José State University"
      />
    </div>

  </div>
</body>
</html>
